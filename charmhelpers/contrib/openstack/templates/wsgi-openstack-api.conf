    WSGIScriptAlias / {{ public_script }}
    WSGIApplicationGroup %{GLOBAL}
    WSGIPassAuthorization On
    KeepAliveTimeout 75
    MaxKeepAliveRequests 1000
    <IfVersion >= 2.4>
