# Configuration file maintained by Juju. Local changes may be overwritten.
{% if port -%}
Listen {{ port }}
{% endif -%}

{% if admin_port -%}
Listen {{ admin_port }}
{% endif -%}

{% if public_port -%}
Listen {{ public_port }}
{% endif -%}

{% if wsgi_socket_rotation -%}
WSGISocketRotation On
{% else -%}
WSGISocketRotation Off
{% endif -%}

{% if port -%}
<VirtualHost *:{{ port }}>
    WSGIDaemonProcess {{ service_name }} processes={{ processes }} threads={{ threads }} user={{ user }} group={{ group }} \
                      display-name=%{GROUP} lang=C.UTF-8 locale=C.UTF-8
    WSGIProcessGroup {{ service_name }}
    WSGIScriptAlias / {{ script }}
    WSGIApplicationGroup %{GLOBAL}
    WSGIPassAuthorization On
    KeepAliveTimeout 75
    MaxKeepAliveRequests 1000
    <IfVersion >= 2.4>
      ErrorLogFormat "%{cu}t %M"
    </IfVersion>
    ErrorLog /var/log/apache2/{{ service_name }}_error.log
    CustomLog /var/log/apache2/{{ service_name }}_access.log combined
    {% if haproxy_enable_proxy_protocol -%}
    RemoteIPProxyProtocol On
    RemoteIPProxyProtocolExceptions 127.0.0.1 ::1
    {% endif -%}
    {% if lua_real_ip_script -%}
    LuaScope thread
    LuaCodeCache forever
    LuaHookTranslateName {{ lua_real_ip_script }} translate early
    {% endif -%}
    {% if apache_rate_limit_enabled -%}
    <IfModule mod_qos.c>
        SetEnvIf Request_URI "." QS_Limit
        {% if rate_limit_exempt_ips -%}
        {% for ip in rate_limit_exempt_ips -%}
        SetEnvIf Remote_Addr "^{{ ip | replace('.', '\.') }}$" !QS_Limit
        {% endfor -%}
        {% endif -%}
    </IfModule>
    {% endif -%}

    <Directory /usr/bin>
        <IfVersion >= 2.4>
            Require all granted
        </IfVersion>
        <IfVersion < 2.4>
            Order allow,deny
            Allow from all
        </IfVersion>
    </Directory>
</VirtualHost>
{% endif -%}

